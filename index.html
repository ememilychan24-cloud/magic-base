<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shining Soul Base | 魔法營地</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --forest-deep: #1b3022;
            --magic-gold: #ffd700;
            --glass-white: rgba(255, 255, 255, 0.85);
            --text-color: #2c3e50;
        }

        body {
            background: linear-gradient(135deg, #2d5a27 0%, #1b3022 100%);
            color: white;
            font-family: 'PingFang HK', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 螢火蟲動畫 */
        .firefly {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--magic-gold);
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 10px var(--magic-gold);
            pointer-events: none;
            z-index: 0;
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.8; }
            to { transform: translate(var(--mx), var(--my)); opacity: 0; }
        }

        /* 個人區域 */
        .profile { text-align: center; margin-bottom: 25px; z-index: 1; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--magic-gold); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
